services:
  postgres:
    image: postgres:16
    container_name: health-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Временный контейнер для автоматической синхронизации схемы Prisma с БД
  db-sync:
    build:
      context: ./server
    container_name: health-db-sync
    command: npx prisma db push
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./server
    container_name: health-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
      db-sync:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./client
    container_name: health-frontend
    restart: always
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
